# ===============================
# Configuración del Servidor
# ===============================
server.port=8080

# ===============================
# Configuración de Base de Datos (PostgreSQL)
# ===============================
# Uso de Variables de Entorno con valores por defecto locales
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/b2b_reconciliation}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# Configuración de Hibernate / JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ===============================
# Configuración de Seguridad (JWT)
# ===============================
jwt.secret=${JWT_SECRET:ClaveSecretaMuyLargaParaQueNadieLaAdivine123456789}